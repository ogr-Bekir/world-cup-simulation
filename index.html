<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takım Seçimi - 2026 Dünya Kupası</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="phone-wrapper">
        
        <div id="welcome-modal" class="modal-overlay">
            <div class="modal-content">
                <h2 class="modal-title">DÜNYA KUPASI SİMÜLATÖRÜ</h2>
                <ul class="modal-steps">
                    <li><span class="step-num">1</span> Temsil edeceğin ülkeyi seç.</li>
                    <li><span class="step-num">2</span> En güçlü kadronu kur ve taktiğini belirle.</li>
                    <li><span class="step-num">3</span> Maçları simüle et ve Dünya Kupası'nı kazan!</li>
                </ul>
                <button id="start-game-btn" class="play-btn">OYNA</button>
            </div>
        </div>

        <header class="main-header">
            <h1>2026 DÜNYA KUPASI</h1>
            <p class="subtitle">Ülkeni Seç</p>
        </header>
        
        <main class="groups-grid">
            
            <div class="group-card">
                <div class="group-title">GRUP A</div>
                <div class="teams-container">
                    <button class="team-slot" data-team="MEX"><img src="flags/mexico.jpg" class="team-flag" alt="MEX"><span class="team-code">MEX</span></button>
                    <button class="team-slot" data-team="RSA"><img src="flags/south-africa.jpg" class="team-flag" alt="RSA"><span class="team-code">RSA</span></button>
                    <button class="team-slot" data-team="KOR"><img src="flags/south-korea.jpg" class="team-flag" alt="KOR"><span class="team-code">KOR</span></button>
                    <button class="team-slot" data-team="CZE"><img src="flags/czech.jpg" class="team-flag" alt="CZE"><span class="team-code">CZE</span></button>
                </div>
            </div>

            <div class="group-card">
                <div class="group-title">GRUP B</div>
                <div class="teams-container">
                    <button class="team-slot" data-team="CAN"><img src="flags/canada.jpg" class="team-flag" alt="CAN"><span class="team-code">CAN</span></button>
                    <button class="team-slot" data-team="BIH"><img src="flags/bosnia.jpg" class="team-flag" alt="BIH"><span class="team-code">BIH</span></button>
                    <button class="team-slot" data-team="QAT"><img src="flags/qatar.jpg" class="team-flag" alt="QAT"><span class="team-code">QAT</span></button>

            </div>

                    <button class="team-slot" data-team="BRA"><img src="flags/brazil.jpg" class="team-flag" alt="BRA"><span class="team-code">BRA</span></button>
                    <button class="team-slot" data-team="MAR"><img src="flags/morocco.jpg" class="team-flag" alt="MAR"><span class="team-code">MAR</span></button>
                    <button class="team-slot" data-team="HTI"><img src="flags/haiti.jpg" class="team-flag" alt="HTI"><span class="team-code">HTI</span></button>
                    <button class="team-slot" data-team="SCO"><img src="flags/scotland.jpg" class="team-flag" alt="SCO"><span class="team-code">SCO</span></button>

                    <button class="team-slot" data-team="COD"><img src="flags/congo.jpg" class="team-flag" alt="COD"><span class="team-code">COD</span></button>
                    <button class="team-slot" data-team="UZB"><img src="flags/turkmenistan.jpg" class="team-flag" alt="UZB"><span class="team-code">UZB</span></button>

                <div class="teams-container">
                    <button class="team-slot" data-team="ENG"><img src="flags/england.jpg" class="team-flag" alt="ENG"><span class="team-code">ENG</span></button>
                    <button class="team-slot" data-team="CRO"><img src="flags/croatia.jpg" class="team-flag" alt="CRO"><span class="team-code">CRO</span></button>
                    <button class="team-slot" data-team="GHA"><img src="flags/ghana.jpg" class="team-flag" alt="GHA"><span class="team-code">GHA</span></button>
                    <button class="team-slot" data-team="PAN"><img src="flags/panama.jpg" class="team-flag" alt="PAN"><span class="team-code">PAN</span></button>

        <div class="action-area">
            <button id="confirm-btn" class="confirm-button" disabled>ÜLKE SEÇ</button>
